<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Parser — Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <span class="logo">📄</span>
            <span>Resume Parser</span>
        </div>
        <ul class="nav-links">
            <li><a href="/">Upload</a></li>
            <li><a href="/dashboard" class="active">Dashboard</a></li>
            <li><a href="/analytics">Analytics</a></li>
        </ul>
    </nav>

    <main class="container">
        <header class="page-header">
            <h1>Candidate Dashboard</h1>
            <p>Search, view, and manage parsed candidate profiles.</p>
        </header>

        <!-- Search Bar -->
        <section class="card search-bar">
            <div class="search-fields">
                <input type="text" id="searchName" class="input" placeholder="Search by name…">
                <input type="text" id="searchSkill" class="input" placeholder="Search by skill…">
                <input type="text" id="searchEducation" class="input" placeholder="Search by education…">
                <button id="searchBtn" class="btn btn-primary">Search</button>
                <button id="clearSearchBtn" class="btn btn-ghost">Clear</button>
            </div>
        </section>

        <!-- Rank by Job -->
        <section class="card">
            <h3>Rank Candidates by Job</h3>
            <div class="rank-fields">
                <input type="text" id="rankJobTitle" class="input" placeholder="Job Title">
                <textarea id="rankJobDesc" class="textarea" rows="3" placeholder="Paste job description to rank all candidates…"></textarea>
                <button id="rankBtn" class="btn btn-secondary">Rank Candidates</button>
            </div>
            <div id="rankResults" class="hidden rank-results"></div>
        </section>

        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Loading candidates…</p>
        </div>

        <div id="errorMsg" class="alert alert-error hidden"></div>

        <!-- Candidate List -->
        <section id="candidateList" class="candidate-grid"></section>

        <!-- Detail Modal -->
        <div id="detailModal" class="modal hidden">
            <div class="modal-content">
                <button id="closeModal" class="modal-close">&times;</button>
                <div id="modalBody"></div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>Resume Parser &copy; 2025 — Built with Flask &amp; SQLite</p>
    </footer>

    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
